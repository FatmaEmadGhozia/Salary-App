<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="shortcut icon" href="./images/salaryos-logo.png" type="image/x-icon">
    <style>
        :root {
            --primaryColor: #0C447C;
            --secondaryColor: #378ADD;
            --primary-navy-hover: #185FA5;
            --primary-blue-light: #85B7EB;
            --primary-blue-tint: #E6F1FB;
            --primary-blue-avatar: #B5D4F4;
        }

        .contain img {
            width: 150px;
            height: 50px;
            padding-left: 20px;
        }

        .navbar {
            background-color: var(--primaryColor);
        }

        .list ul {
            margin-left: 250px;
        }

        .profile {
            background-color: var(--secondaryColor);
            width: 40px;
            height: 40px;
            text-align: center;
        }

        .role {
            color: #F09595;
            background: rgba(226, 75, 74, 0.2);
        }

        .emp-num,
        .total-net {
            width: 200px;
            background-color: var(--secondaryColor);
            height: fit-content;
            width: fit-content;
            font-weight: 500;
        }

        .emp-num span:last-of-type,
        .total-net span:last-of-type {
            margin-top: -10px;
        }

        .admin-dashboard {
            color: var(--primary-navy-hover);

        }

        .info {
            background-color: rgb(175, 104, 104);
            width: 350px;
            height: 200px;
            background-color: white;

        }
        .info p:last-of-type {
            margin-top: -15px;
        }
        .user-data{
            background-color: white;
        }
        .add-btn {
            height: fit-content;
        }
    </style>
</head>

<body style="background-color: var(--bg-page);">

    <nav class="navbar navbar-expand-lg ">
        <div class=" contain container-fluid p-2">
            <!-- <a class="navbar-brand" href="#">Navbar scroll</a> -->
            <img src="./images/salaryos-logo (1).png" alt="" class="">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll"
                aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class=" list collapse navbar-collapse" id="navbarScroll">
                <ul class="navbar-nav me-auto my-2 my-lg-0 navbar-nav-scroll gap-3" style="--bs-scroll-height: 100px;">
                    <li class="nav-item">
                        <a class="nav-link active text-white fs-3" aria-current="page" href="#">DashBoard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white fs-3" href="#">Employees</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link active text-white fs-3" aria-current="page" href="#">Reports</a>


                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link active text-white fs-3" aria-current="page" href="#">Payroll</a>


                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled text-white fs-3" aria-disabled="true">Settings</a>
                    </li>
                </ul>

                <div class="d-flex justify-content-center gap-3 me-3">
                    <i class="bi bi-bell fs-3 text-white"></i>
                    <div class=" role  rounded-3 p-1  d-inline-block fs-4">Admin</div>
                    <div class="profile text-white p-1 fs-5 fw-bold rounded-circle d-inline-block">FA</div>

                </div>
            </div>
        </div>
    </nav>
    <main>
        <div class="main-container">
            <div class="main-header">
                <div class="main-description d-flex justify-content-between px-4">
                    <div>
                        <h2 class=" admin-dashboard mb-1 mt-4 fs-1 fw-bold">Admin Dashboard</h2>
                        <p class="fs-4">Tuesday, March 17, 2026 · Q1 Payroll Period</p>
                    </div>
                    <div class="d-flex align-items-center gap-5 mt-4 fs-4 rounded-2 text-light">
                        <div class="emp-num  rounded-2 p-3  bg-light text-dark ">

                            <span class="d-block ">Export Report</span>
                        </div>
                        <!-- <div class="total-net rounded-2 p-2 text-center fs-4 text-light">
                            <span class="d-block"> $14,500</span>
                            <span class="d-block">Total Net</span>
                        </div> -->
                    </div>
                </div>



            </div>

            <div class="row emp-info mt-4 mx-4 gap-4 justify-content-between ">
                <div class="info col-6 col-lg-6  col-sm-12 p-4 rounded-4 ">
                    <div class="stat-icon mb-2 p-3 rounded-3 text-center " style="background:var(--primary-blue-tint); font-size:22px;width: fit-content; height: fit-content; ;">👥</div>
                    <p class="fs-1 fw-bold" style="color: var(--primary-navy-hover);">0</p>
                    <p class="fs-5">Total Empoloyess</p>
                </div>
                <div class="info col-6 p-4 rounded-4 ">
                    <div class="stat-icon mb-2 p-3 rounded-3 text-center " style="background:var(--green-tint); font-size:22px;width: fit-content; height: fit-content; ;">💰</div>
                    <p class="fs-1 fw-bold" style="color: var(--primary-navy-hover);">$0</p>
                    <p class="fs-5">Total Gross Payroll</p>
                </div>
                <div class="info col-6 p-4 rounded-4 ">
                    <div class="stat-icon mb-2 p-3 rounded-3 text-center " style="background:var(--amber-tint); font-size:22px;width: fit-content; height: fit-content; ;">⭐</div>
                    <p class="fs-1 fw-bold" style="color: var(--primary-navy-hover);">$0</p>
                    <p class="fs-5">Total Bonuses</p>
                </div>
                <div class="info col-6 p-4 rounded-4 ">
                    <div class="stat-icon mb-2 p-3 rounded-3 text-center " style="background:var(--primary-blue-tint); font-size:22px;width: fit-content; height: fit-content; ;">💵</div>
                    <p class="fs-1 fw-bold" style="color: var(--primary-navy-hover);">$0</p>
                    <p class="fs-5">Total Net Salary</p>
                </div>
                
                
                

            </div>

            <div class="user-data w-full p-3 w-500 mt-5 rounded-4 mb-5 mx-4 ">
                <p>Add New Employee</p>
                <div class="row">
                    <div class="d-flex flex-column col-3">
                        <label for="fullname" class="mb-2">FULL NAME *</label>
                        <input type="text" class="form-control p-2" id="fullname" name="fullname" placeholder="e.g. Fatma Emad">
                    </div>
                     <div class="d-flex flex-column col-3">
                        <label for="fullname" class="mb-2">FULL NAME *</label>
                        <input type="text"  class="form-control p-2" id="fullname" name="fullname" placeholder="e.g. 5000">
                    </div>
                     <div class="d-flex flex-column col-2">
                        <label for="fullname" class="mb-2">FULL NAME *</label>
                        <input type="text" class="form-control p-2" id="fullname" name="fullname" placeholder="e.g. 300">
                    </div>
                     <div class="d-flex flex-column col-2">
                        <label for="fullname" class="mb-2">FULL NAME *</label>
                        <input type="text" class="form-control p-2" id="fullname" name="fullname" placeholder="e.g. 0">
                    </div>
                     <div class="d-flex flex-column col-2" >
                        <label for="fullname" class="mb-2">FULL NAME *</label>
                        <input type="text"class="form-control p-2" id="fullname" name="fullname" placeholder="e.g. 8">
                    </div>
                    


                </div>
                <div class="row mt-3 mb-4">
                    <div class="d-flex flex-column col-3">
                        <label for="fullname" class="mb-2">FULL NAME *</label>
                        <input type="text" class="form-control p-2" id="fullname" name="fullname" placeholder="e.g. Fatma Emad">
                    </div>
                     <div class="d-flex flex-column col-3">
                        <label for="fullname" class="mb-2">FULL NAME *</label>
                        <input type="text"  class="form-control p-2" id="fullname" name="fullname" placeholder="e.g. 5000">
                    </div>
                    <button type="reset" class=" add-btn col-2 btn btn-primary btn-lg d-flex align-items-center "> + Add Employee</button>
                    


                </div>



            </div>

    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./js/main.js"></script>
</body>

</html>
