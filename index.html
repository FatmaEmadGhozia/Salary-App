<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="shortcut icon" href="./images/salaryos-logo.png" type="image/x-icon">
    <style>
        :root {
            --primaryColor: #0C447C;
            --secondaryColor: #378ADD;
        }

        .contain img {
            width: 150px;
            height: 50px;
            padding-left: 20px;
        }

        .navbar {
            background-color: var(--primaryColor);
        }

        .list ul {
            margin-left: 250px;
        }

        .profile {
            background-color: var(--secondaryColor);
            width: 40px;
            height: 40px;
            text-align: center;
        }

        .role {
            color: #F09595;
            background: rgba(226, 75, 74, 0.2);
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg ">
        <div class=" contain container-fluid p-2">
            <!-- <a class="navbar-brand" href="#">Navbar scroll</a> -->
            <img src="./images/salaryos-logo (1).png" alt="" class="">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll"
                aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class=" list collapse navbar-collapse" id="navbarScroll">
                <ul class="navbar-nav me-auto my-2 my-lg-0 navbar-nav-scroll border border-danger gap-3"
                    style="--bs-scroll-height: 100px;">
                    <li class="nav-item">
                        <a class="nav-link active text-white fs-3" aria-current="page" href="#">DashBoard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white fs-3" href="#">Employees</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link active text-white fs-3" aria-current="page" href="#">Reports</a>


                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link active text-white fs-3" aria-current="page" href="#">Payroll</a>


                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled text-white fs-3" aria-disabled="true">Settings</a>
                    </li>
                </ul>
                <!-- <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form> -->
                <div class="d-flex justify-content-center gap-3 me-3">
                    <i class="bi bi-bell fs-3 text-white"></i>
                    <div class=" role  rounded p-1  d-inline-block fs-4">Admin</div>
                    <div class="profile text-white p-2 fs-5 fw-bold rounded-circle d-inline-block">FA</div>

                </div>
            </div>
        </div>
    </nav>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./js/main.js"></script>
</body>

</html>
